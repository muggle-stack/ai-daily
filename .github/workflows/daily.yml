name: AI Daily Report

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:         # 支持手动触发

permissions:
  contents: write

jobs:
  generate-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI Daily
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_FOLDER_TOKEN: ${{ secrets.FEISHU_FOLDER_TOKEN }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          GITHUB_PAGES_URL: ${{ secrets.GITHUB_PAGES_URL }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
        run: python -m src.main

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
          destination_dir: .

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: output/
          retention-days: 30
